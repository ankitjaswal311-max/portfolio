<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ankit Jaswal - Senior WordPress & Shopify Developer with 4.5+ years of experience.">
    <title>Ankit Jaswal | WordPress & Shopify Expert Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        
         :root {
            --bg: #FFFFFF;
            --bg-alt: #FAFBFC;
            --surface: #F1F3F4;
            --surface-2: #E8EAED;
            --primary: #1A73E8;
            --primary-hover: #1557B0;
            --primary-light: rgba(26, 115, 232, 0.07);
            --primary-medium: rgba(26, 115, 232, 0.14);
            --primary-glow: rgba(26, 115, 232, 0.22);
            --secondary: #34A853;
            --secondary-light: rgba(52, 168, 83, 0.08);
            --accent: #FBBC04;
            --accent-light: rgba(251, 188, 4, 0.10);
            --error: #EA4335;
            --error-light: rgba(234, 67, 53, 0.08);
            --purple: #9C27B0;
            --purple-light: rgba(156, 39, 176, 0.08);
            --teal: #009688;
            --teal-light: rgba(0, 150, 136, 0.08);
            --shopify: #5E8E3E;
            --shopify-bg: rgba(150, 191, 72, 0.09);
            --wordpress: #21759B;
            --wordpress-bg: rgba(33, 117, 155, 0.09);
            --text: #202124;
            --text-secondary: #5F6368;
            --text-tertiary: #80868B;
            --border: #E8EAED;
            --border-2: #F1F3F4;
            --code-bg: #1E1E2E;
            --code-text: #CDD6F4;
            --code-keyword: #CBA6F7;
            --code-func: #89B4FA;
            --code-str: #A6E3A1;
            --code-comment: #6C7086;
            --code-var: #F38BA8;
            --code-num: #FAB387;
            --code-tag: #89DCEB;
            --code-attr: #F9E2AF;
            --code-punct: #BAC2DE;
            --sh-sm: 0 1px 3px rgba(60, 64, 67, .10), 0 1px 2px rgba(60, 64, 67, .06);
            --sh-md: 0 4px 6px rgba(60, 64, 67, .07), 0 2px 4px rgba(60, 64, 67, .06);
            --sh-lg: 0 10px 15px rgba(60, 64, 67, .08), 0 4px 6px rgba(60, 64, 67, .05);
            --sh-xl: 0 20px 25px rgba(60, 64, 67, .10), 0 8px 10px rgba(60, 64, 67, .04);
            --sh-2xl: 0 25px 50px rgba(60, 64, 67, .15);
            --sh-primary: 0 4px 14px rgba(26, 115, 232, .28);
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --r-2xl: 24px;
            --r-full: 9999px;
            --max-w: 1300px;
            --nav-h: 72px;
            --ease: cubic-bezier(.4, 0, .2, 1);
            --tf: .15s;
            --tn: .3s;
        }
        
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale
        }
        
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            overflow-x: hidden
        }
        
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Manrope', sans-serif;
            line-height: 1.25;
            font-weight: 700
        }
        
        img {
            max-width: 100%;
            height: auto;
            display: block
        }
        
        a {
            text-decoration: none;
            color: inherit
        }
        
        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit
        }
        
        ul {
            list-style: none
        }
        
         ::selection {
            background: var(--primary-medium);
            color: var(--primary-hover)
        }
        
        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px
        }
        /* SKIP */
        
        .skip-link {
            position: absolute;
            top: -100%;
            left: 16px;
            padding: 12px 24px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            border-radius: var(--r-md);
            z-index: 10000;
            transition: top .2s
        }
        
        .skip-link:focus {
            top: 16px
        }
        /* LOADER */
        
        .page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity .5s var(--ease), visibility .5s
        }
        
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none
        }
        
        .loader-ring {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
        /* ===== NAV ===== */
        
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, .78);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            transition: var(--tn) var(--ease)
        }
        
        .nav.scrolled {
            background: rgba(255, 255, 255, .95);
            box-shadow: 0 1px 0 var(--border)
        }
        
        .nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%
        }
        
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 1.0625rem;
            flex-shrink: 0
        }
        
        .nav-logo-mark {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #4285F4);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1rem
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2px
        }
        
        .nav-link {
            padding: 7px 12px;
            border-radius: var(--r-full);
            font-size: .8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--tf) var(--ease)
        }
        
        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
            background: var(--primary-light)
        }
        
        .nav-end {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px
        }
        
        .nav-cta {
            padding: 8px 20px;
            background: var(--primary);
            color: #fff;
            border-radius: var(--r-full);
            font-size: .8125rem;
            font-weight: 600;
            transition: var(--tn) var(--ease);
            white-space: nowrap
        }
        
        .nav-cta:hover {
            box-shadow: var(--sh-primary);
            transform: translateY(-1px)
        }
        /* MOBILE TOGGLE */
        
        .mob-toggle {
            display: none;
            width: 44px;
            height: 44px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
            border-radius: var(--r-sm);
            transition: background var(--tf);
            -webkit-tap-highlight-color: transparent
        }
        
        .mob-toggle:hover {
            background: var(--surface)
        }
        
        .mob-toggle span {
            width: 20px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: var(--tn) var(--ease);
            display: block;
            transform-origin: center
        }
        
        .mob-toggle.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px)
        }
        
        .mob-toggle.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0)
        }
        
        .mob-toggle.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px)
        }
        /* MOBILE MENU — FIXED */
        
        .mob-menu {
            position: fixed;
            top: var(--nav-h);
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 998;
            display: flex;
            flex-direction: column;
            padding: 16px 20px 32px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            transform: translateX(100%);
            transition: transform .35s var(--ease);
            visibility: hidden
        }
        
        .mob-menu.open {
            transform: translateX(0);
            visibility: visible
        }
        
        .mob-menu .mob-link {
            display: block;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            border-radius: var(--r-md);
            transition: var(--tf);
            text-align: left
        }
        
        .mob-menu .mob-link:hover,
        .mob-menu .mob-link:active {
            background: var(--primary-light);
            color: var(--primary)
        }
        
        .mob-menu .mob-divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0
        }
        
        .mob-menu .mob-cta {
            display: block;
            margin-top: auto;
            padding: 16px 24px;
            background: var(--primary);
            color: #fff;
            border-radius: var(--r-md);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            transition: var(--tn)
        }
        
        .mob-menu .mob-cta:hover {
            box-shadow: var(--sh-primary)
        }
        
        .mob-overlay {
            position: fixed;
            inset: 0;
            top: var(--nav-h);
            background: rgba(0, 0, 0, .3);
            z-index: 997;
            opacity: 0;
            visibility: hidden;
            transition: opacity .35s var(--ease), visibility .35s
        }
        
        .mob-overlay.open {
            opacity: 1;
            visibility: visible
        }
        
        body.menu-open {
            overflow: hidden
        }
        /* BUTTONS */
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 26px;
            border-radius: var(--r-full);
            font-size: .875rem;
            font-weight: 600;
            transition: var(--tn) var(--ease);
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            justify-content: center
        }
        
        .btn-lg {
            padding: 15px 32px;
            font-size: .9375rem
        }
        
        .btn-primary {
            background: var(--primary);
            color: #fff
        }
        
        .btn-primary:hover {
            box-shadow: var(--sh-primary);
            transform: translateY(-2px)
        }
        
        .btn-outline {
            border: 1.5px solid var(--border);
            color: var(--text);
            background: var(--bg)
        }
        
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
            transform: translateY(-2px)
        }
        
        .btn-white {
            background: #fff;
            color: var(--text)
        }
        
        .btn-white:hover {
            box-shadow: var(--sh-xl);
            transform: translateY(-2px)
        }
        
        .btn-ow {
            border: 1.5px solid rgba(255, 255, 255, .3);
            color: #fff
        }
        
        .btn-ow:hover {
            background: rgba(255, 255, 255, .1);
            border-color: rgba(255, 255, 255, .5)
        }
        
        .btn-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0
        }
        
        .rip {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, .3);
            transform: scale(0);
            animation: ripa .6s linear;
            pointer-events: none
        }
        
        @keyframes ripa {
            to {
                transform: scale(4);
                opacity: 0
            }
        }
        /* SECTIONS */
        
        .section {
            padding: 96px 0
        }
        
        .section-header {
            text-align: center;
            max-width: 620px;
            margin: 0 auto 56px
        }
        
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 5px 14px;
            border-radius: var(--r-full);
            font-size: .6875rem;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: .08em;
            text-transform: uppercase
        }
        
        .sl-blue {
            background: var(--primary-light);
            color: var(--primary)
        }
        
        .sl-green {
            background: var(--shopify-bg);
            color: var(--shopify)
        }
        
        .sl-wp {
            background: var(--wordpress-bg);
            color: var(--wordpress)
        }
        
        .sl-purple {
            background: var(--purple-light);
            color: var(--purple)
        }
        
        .sl-teal {
            background: var(--teal-light);
            color: var(--teal)
        }
        
        .sl-orange {
            background: var(--accent-light);
            color: #E37400
        }
        
        .section-title {
            font-size: clamp(1.75rem, 3.5vw, 2.5rem);
            margin-bottom: 14px
        }
        
        .section-title span {
            background: linear-gradient(135deg, var(--primary), var(--shopify));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }
        
        .section-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.75
        }
        /* ===== HERO — MOBILE FIXED ===== */
        
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: var(--nav-h);
            position: relative;
            overflow: hidden
        }
        
        .hero-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, var(--surface-2) 1px, transparent 0);
            background-size: 40px 40px;
            opacity: .4;
            pointer-events: none
        }
        
        .hero-blob1 {
            position: absolute;
            top: -25%;
            right: -12%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--primary-light) 0%, transparent 70%);
            pointer-events: none
        }
        
        .hero-blob2 {
            position: absolute;
            bottom: -30%;
            left: -12%;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, var(--shopify-bg) 0%, transparent 70%);
            pointer-events: none
        }
        
        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
            position: relative;
            z-index: 2
        }
        
        .hero-content {
            text-align: left
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 7px 16px 7px 9px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r-full);
            font-size: .8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 28px;
            box-shadow: var(--sh-sm)
        }
        
        .hero-badge-dot {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            flex-shrink: 0;
            position: relative
        }
        
        .hero-badge-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--secondary);
            opacity: .25;
            animation: pring 2s infinite
        }
        
        @keyframes pring {
            0% {
                transform: scale(1);
                opacity: .25
            }
            100% {
                transform: scale(2.5);
                opacity: 0
            }
        }
        
        .hero-eyebrow {
            font-size: .9375rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 7px
        }
        
        .hero-eyebrow svg {
            width: 18px;
            height: 18px
        }
        
        .hero-title {
            font-size: clamp(2.25rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -.02em
        }
        
        .hero-title .grad {
            background: linear-gradient(135deg, var(--primary) 0%, #7C4DFF 50%, var(--shopify) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }
        
        .hero-sub {
            font-size: clamp(1rem, 1.8vw, 1.25rem);
            color: var(--text-secondary);
            margin-bottom: 22px;
            line-height: 1.65
        }
        
        .hero-sub strong {
            color: var(--text);
            font-weight: 600
        }
        
        .hero-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 28px
        }
        
        .hero-pill {
            padding: 5px 13px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r-full);
            font-size: .75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            transition: var(--tf)
        }
        
        .hero-pill:hover {
            transform: translateY(-2px);
            box-shadow: var(--sh-sm)
        }
        
        .hp-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0
        }
        
        .hero-actions {
            display: flex;
            gap: 11px;
            flex-wrap: wrap;
            margin-bottom: 40px
        }
        
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            padding: 0;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            overflow: hidden
        }
        
        .hero-stat {
            text-align: center;
            padding: 20px 16px;
            position: relative
        }
        
        .hero-stat:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: var(--border)
        }
        
        .hs-val {
            font-family: 'Manrope', sans-serif;
            font-size: 1.625rem;
            font-weight: 800
        }
        
        .hs-lbl {
            font-size: .75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500
        }
        /* CODE WINDOW */
        
        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center
        }
        
        .cw {
            width: 100%;
            max-width: 500px;
            background: var(--code-bg);
            border-radius: var(--r-2xl);
            overflow: hidden;
            box-shadow: var(--sh-2xl)
        }
        
        .cw-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, .04);
            border-bottom: 1px solid rgba(255, 255, 255, .06)
        }
        
        .cw-dots {
            display: flex;
            gap: 6px
        }
        
        .cw-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%
        }
        
        .cw-dot:nth-child(1) {
            background: #FF5F57
        }
        
        .cw-dot:nth-child(2) {
            background: #FEBC2E
        }
        
        .cw-dot:nth-child(3) {
            background: #28C840
        }
        
        .cw-title {
            flex: 1;
            text-align: center;
            font-size: .6875rem;
            color: var(--code-comment);
            font-family: 'JetBrains Mono', monospace
        }
        
        .cw-tabs {
            display: flex;
            padding: 0 14px;
            background: rgba(255, 255, 255, .02);
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            overflow-x: auto
        }
        
        .cw-tab {
            padding: 9px 14px;
            font-size: .6875rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--code-comment);
            border-bottom: 2px solid transparent;
            transition: var(--tf);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0
        }
        
        .cw-tab.on {
            color: var(--code-text);
            border-bottom-color: var(--primary)
        }
        
        .cw-body {
            padding: 20px;
            min-height: 280px;
            overflow-x: auto
        }
        
        .cw-pane {
            display: none
        }
        
        .cw-pane.on {
            display: block
        }
        
        .cl {
            display: flex;
            gap: 14px;
            line-height: 1.75;
            font-size: .75rem
        }
        
        .cl-n {
            color: var(--code-comment);
            user-select: none;
            min-width: 18px;
            text-align: right;
            font-size: .6875rem;
            font-family: 'JetBrains Mono', monospace
        }
        
        .cl-c {
            white-space: pre;
            font-family: 'JetBrains Mono', monospace
        }
        
        .ck {
            color: var(--code-keyword)
        }
        
        .cf {
            color: var(--code-func)
        }
        
        .cs {
            color: var(--code-str)
        }
        
        .cc {
            color: var(--code-comment);
            font-style: italic
        }
        
        .cv {
            color: var(--code-var)
        }
        
        .cn {
            color: var(--code-num)
        }
        
        .ct {
            color: var(--code-tag)
        }
        
        .ca {
            color: var(--code-attr)
        }
        
        .cp {
            color: var(--code-punct)
        }
        
        .cursor {
            display: inline-block;
            width: 2px;
            height: .9em;
            background: var(--primary);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 1px
